name: exora-dock
arch: ${GOARCH}
platform: linux
version: ${VERSION}
section: default
priority: optional
maintainer: Exora Dock <hello@exora.local>
description: Local/provider capability dock for AI agents.
homepage: https://exoradock.com/
license: MIT
contents:
  - src: ./exora-dock
    dst: /usr/bin/exora-dockd
  - src: ./exora-dock
    dst: /usr/bin/exora-dockctl
  - src: ./config.example.yaml
    dst: /etc/exora-dock/config.yaml
    type: config|noreplace
  - src: ./packaging/deb/exora-dockd.service
    dst: /lib/systemd/system/exora-dockd.service
scripts:
  postinstall: ./packaging/deb/postinstall.sh
  preremove: ./packaging/deb/preremove.sh
