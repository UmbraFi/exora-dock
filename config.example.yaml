# Exora Dock V3 Configuration
listen_addr: ":8080"
cache_max_mb: 256
data_dir: "./data"
mode: "hybrid"
cloud_url: ""
cloud_token_path: "" # Defaults to data_dir/cloud-token.json
dock_id: ""
auth_token_path: "" # Defaults to data_dir/auth.json
cors_allowed_origins:
  - "http://localhost:*"
  - "http://127.0.0.1:*"
  - "tauri://localhost"
  - "https://exoradock.com"
  - "https://www.exoradock.com"
