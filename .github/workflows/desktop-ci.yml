name: Desktop CI

on:
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-ci.yml'
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-ci.yml'

permissions:
  contents: read

jobs:
  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: macos-14
            label: macos-arm64
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
        working-directory: desktop
      - run: npm run build:frontend
        working-directory: desktop
      - run: npm run build:electron
        working-directory: desktop
