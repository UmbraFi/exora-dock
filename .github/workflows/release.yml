name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop
      - name: Build daemon sidecar
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/binaries | Out-Null
          $env:CGO_ENABLED='0'
          $env:GOOS='windows'
          $env:GOARCH='amd64'
          go build -o desktop/binaries/exora-dockd.exe ./cmd/exora-dock/
          go build -o desktop/binaries/exora-wsl-broker.exe ./cmd/exora-worker/
      - name: Fetch and verify bundled WSL Runtime
        shell: pwsh
        run: ./scripts/fetch-wsl-runtime.ps1
      - name: Build exe installer
        run: npm run build:exe
        working-directory: desktop
      - name: Create signed release manifest and checksums
        shell: pwsh
        env:
          EXORA_RELEASE_SIGNING_PRIVATE_KEY_BASE64: ${{ secrets.EXORA_RELEASE_SIGNING_PRIVATE_KEY_BASE64 }}
        run: |
          $artifact = Get-ChildItem desktop/release/*Unsigned-Technical-Preview.exe | Select-Object -First 1
          node scripts/build-release-manifest.cjs $artifact.FullName desktop/release "${{ github.ref_name }}" "${{ github.sha }}"
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: desktop/release
          artifact-name: Exora-Dock-Windows-x64-SBOM.spdx.json
          output-file: desktop/release/Exora-Dock-Windows-x64-SBOM.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: exora-dock-exe
          path: |
            desktop/release/*.exe
            desktop/release/release-manifest.json
            desktop/release/release-manifest.sig
            desktop/release/SHA256SUMS.txt
            desktop/release/*SBOM*.json

  release:
    needs: [desktop-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: Exora Dock 0.1.0 Preview 1 (Unsigned Technical Preview)
          prerelease: true
          make_latest: false
          body: |
            Windows x64 only. This is an unsigned technical preview and is not a production or compliance release.

            Windows may show an Unknown publisher or SmartScreen warning because this installer does not use Authenticode. Verify the signed release manifest and SHA-256 checksum before running it.
          files: |
            *.exe
            release-manifest.json
            release-manifest.sig
            SHA256SUMS.txt
            *SBOM*.json
