<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />

    <title>Button visual fixture</title>
    <style>
      body { min-width: 0; min-height: 0; padding: 24px; }
      .fixture { width: 620px; }
      .fixture .v3-api-price-component { margin-top: 16px; grid-template-columns: minmax(150px, 1fr) auto; }

  <body>
    <main class="fixture app-shell seller-surface-mode">

        <span class="v3-shared-file-name"><strong>openapi.json</strong><small>1.2 KB · stored locally</small></span>
        <button class="danger ghost" type="button" data-test-remove="material">Remove</button>
      </div>
      <div class="v3-api-price-component">
        <label>Meter<select><option>request</option></select></label>
        <button class="danger ghost" type="button" data-test-remove="price">Remove</button>
      </div>
    </main>
